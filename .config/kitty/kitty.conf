# core
confirm_os_window_close 0
sync_to_monitor yes
enable_audio_bell no
linux_display_server wayland
font_size 12.0

# performance
repaint_delay 6
input_delay 1
sync_to_monitor no

# url
url_style curly
open_url_with default
detect_urls yes

# clipboard
copy_on_select yes
map ctrl+v paste_from_clipboard
map ctrl+c copy_and_clear_or_interrupt

# navigation
map ctrl+t new_tab
map ctrl+w close_tab
map ctrl+right next_tab
map ctrl+left previous_tab

# scroll
map ctrl+up scroll_line_up
map ctrl+down scroll_line_down
map ctrl+page_up scroll_page_up
map ctrl+page_down scroll_page_down

# zoom
map ctrl+equal change_font_size all +2.0
map ctrl+plus change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# fonts
#font_family monofur
#bold_font monofur bold
#italic_font monofur italic
#bold_italic_font monofur bold italic

# jetbrains
#font_family JetBrainsMono Nerd Font
#bold_font JetBrainsMono Nerd Font Bold
#italic_font JetBrainsMono Nerd Font Italic
#bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_features JetBrainsMonoNF-Regular +liga +calt
font_features JetBrainsMonoNF-Bold +liga +calt

# firacode
font_family FiraCode Nerd Font
bold_font FiraCode Nerd Font Bold
italic_font FiraCode Nerd Font Italic
bold_italic_font FiraCode Nerd Font Bold Italic

# cascadia
#font_family CaskaydiaCove Nerd Font
#bold_font CaskaydiaCove Nerd Font Bold
#italic_font CaskaydiaCove Nerd Font Italic
#bold_italic_font CaskaydiaCove Nerd Font Bold Italic

# hack
#font_family Hack Nerd Font
#bold_font Hack Nerd Font Bold
#italic_font Hack Nerd Font Italic
#bold_italic_font Hack Nerd Font Bold Italic

# iosevka
#font_family Iosevka Nerd Font
#bold_font Iosevka Nerd Font Bold
#italic_font Iosevka Nerd Font Italic
#bold_italic_font Iosevka Nerd Font Bold Italic

# cursor
cursor #f8b4c8
cursor_text_color #0c0408
cursor_shape beam
cursor_blink_interval 0

# window
window_padding_width 15
hide_window_decorations yes
draw_minimal_borders yes
window_border_width 1px
active_border_color #3a1525
inactive_border_color #0c0408

# tabs
tab_bar_edge bottom
tab_bar_style fade
tab_fade 1
tab_bar_align left
tab_bar_min_tabs 2
tab_activity_symbol none
bell_on_tab no

active_tab_foreground #f8b4c8
active_tab_background #0c0408
active_tab_font_style bold
inactive_tab_foreground #b898a8
inactive_tab_background #0c0408
tab_bar_background #0c0408

# colors
foreground #ffe0ec
background #0c0408
background_opacity 0.82
background_blur 30

selection_foreground #0c0408
selection_background #f8b4c8

color0  #0c0408
color1  #c46080
color2  #a6e3a1
color3  #f9e2af
color4  #f8b4c8
color5  #cba6f7
color6  #89dceb
color7  #ffe0ec

color8  #3a1525
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #f8b4c8
color13 #cba6f7
color14 #89dceb
color15 #ffffff

# misc
map alt+enter new_window_with_cwd
map alt+c close_tab
