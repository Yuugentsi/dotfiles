# core
confirm_os_window_close 0
sync_to_monitor yes
enable_audio_bell no
linux_display_server wayland

# performance
repaint_delay 6
input_delay 1
sync_to_monitor no

# url
url_style curly
open_url_with default
detect_urls yes

# clipboard
copy_on_select yes
map ctrl+v paste_from_clipboard
map ctrl+c copy_and_clear_or_interrupt

# navigation
map ctrl+t new_tab
map ctrl+w close_tab
map ctrl+right next_tab
map ctrl+left previous_tab

# scroll
map ctrl+up scroll_line_up
map ctrl+down scroll_line_down
map ctrl+page_up scroll_page_up
map ctrl+page_down scroll_page_down

# zoom
map ctrl+equal change_font_size all +2.0
map ctrl+plus change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# fonts
font_family JetBrainsMono Nerd Font
bold_font JetBrainsMono Nerd Font Bold
italic_font JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size 9.0

font_features JetBrainsMonoNF-Regular +liga +calt
font_features JetBrainsMonoNF-Bold +liga +calt

# cursor
cursor #f8b4c8
cursor_text_color #0c0408
cursor_shape block
cursor_blink_interval 0

# window
window_padding_width 14 18
hide_window_decorations yes
draw_minimal_borders yes
window_border_width 1px
active_border_color #f8b4c8
inactive_border_color #3a1525
bell_border_color #fcf520

# tabs
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2

active_tab_foreground #0c0408
active_tab_background #f8b4c8
active_tab_font_style bold
inactive_tab_foreground #e8c0d0
inactive_tab_background #2a0e18
tab_bar_background #0c0408
tab_title_template " {index} {title} "

# colors
foreground #ffe0ec
background #0c0408
background_opacity 0.55
background_blur 40

selection_foreground #0c0408
selection_background #f0b8c8

color0  #0c0408
color1  #e87898
color2  #6ee7b7
color3  #fdba74
color4  #f8b4c8
color5  #d4899e
color6  #7dd3c0
color7  #ffe0ec
color8  #3a1525
color9  #f06292
color10 #6ee7b7
color11 #fdba74
color12 #f8b4c8
color13 #d4899e
color14 #7dd3c0
color15 #ffffff

# misc
map alt+enter new_window_with_cwd
map alt+c close_tab
